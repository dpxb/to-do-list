<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的待办清单</title>

    <style>
        /* --- 1. 基础样式 --- */
        * {
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #F5F5F7; 
            display: flex;
            justify-content: center;
            padding: 40px 20px; 
            color: #1D1D1F;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: #FFFFFF;
            padding: 30px;
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); 
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 24px;
        }

        /* --- 2. 输入区域 --- */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .input-group input {
            flex: 1;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #E5E5EA;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: #007AFF;
        }

        button {
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-add {
            background-color: #007AFF;
            color: white;
            padding: 0 20px;
            font-weight: bold;
        }

        /* --- 3. 任务列表 --- */
        .task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background-color: #FAFAFC;
            border-radius: 12px;
            margin-bottom: 12px;
            transition: background-color 0.3s;
        }

        .task-text {
            font-size: 16px;
            color: #333;
            word-break: break-all; 
            padding-right: 10px;
            transition: all 0.3s;
        }

        /* 已完成任务的样式 */
        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #8E8E93;
            opacity: 0.6;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-complete {
            background-color: #E8F5E9;
            color: #34C759;
            padding: 8px 12px;
            transition: all 0.3s;
        }

        .task-item.completed .btn-complete {
            background-color: #F2F2F7;
            color: #8E8E93;
        }

        .btn-delete {
            background-color: #FFEBEE;
            color: #FF3B30;
            padding: 8px 12px;
        }

        /* --- 4. 自定义弹窗样式 --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background-color: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 300px;
            width: 90%;
        }

        .modal-content p {
            margin-bottom: 20px;
            font-size: 16px;
            color: #1D1D1F;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn-cancel {
            background-color: #F2F2F7;
            color: #1D1D1F;
            padding: 8px 20px;
        }

        .btn-confirm {
            background-color: #FF3B30;
            color: white;
            padding: 8px 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>我的待办清单</h1>

        <div class="input-group">
            <input type="text" id="taskInput" placeholder="接下来要做什么？">
            <button class="btn-add" id="addBtn">添加</button>
        </div>

        <ul class="task-list" id="taskList">
            <!-- 任务列表将由 JavaScript 动态生成 -->
        </ul>
    </div>

    <!-- 确认删除的自定义弹窗 -->
    <div id="deleteModal" class="modal-overlay">
        <div class="modal-content">
            <p>确定要删除这个任务吗？</p>
            <div class="modal-actions">
                <button id="cancelDeleteBtn" class="btn-cancel">取消</button>
                <button id="confirmDeleteBtn" class="btn-confirm">确定</button>
            </div>
        </div>
    </div>

    <!-- 注意：去掉了 type="module"，恢复为最普通的 script，保证本地完美运行 -->
    <script>
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        
        const deleteModal = document.getElementById('deleteModal');
        const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
        const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');

        // ==========================================
        // 核心数据模型 (Data Model)
        // ==========================================
        // 我们把所有任务都存在这个数组里。页面的显示完全由这个数组决定。
        let currentTasks = []; 
        let itemToDeleteId = null; 

        // 1. 从本地仓库加载数据
        function loadTasks() {
            const savedData = localStorage.getItem('myLocalTodoList');
            if (savedData) {
                currentTasks = JSON.parse(savedData);
            } else {
                currentTasks = [];
            }
            renderTasks(); // 数据加载完后，画到页面上
        }

        // 2. 把数据保存到本地仓库
        function saveTasks() {
            localStorage.setItem('myLocalTodoList', JSON.stringify(currentTasks));
        }

        // 3. 负责把数组"画"到页面上的函数 (数据驱动视图)
        function renderTasks() {
            taskList.innerHTML = ''; // 先清空屏幕

            // 巧妙的分类逻辑：把未完成和已完成的任务分开
            const uncompletedTasks = currentTasks.filter(task => !task.completed);
            const completedTasks = currentTasks.filter(task => task.completed);

            // 合并显示：未完成的永远在上面，已完成的永远在下面！
            const tasksToDisplay = [...uncompletedTasks, ...completedTasks];

            // 挨个生成 HTML 卡片
            tasksToDisplay.forEach(task => {
                const newItem = document.createElement('li');
                newItem.className = 'task-item';
                if (task.completed) newItem.classList.add('completed');
                
                // 把唯一的 ID 绑定在卡片上，方便以后找
                newItem.dataset.id = task.id; 

                const btnText = task.completed ? '取消' : '完成';

                newItem.innerHTML = `
                    <span class="task-text">${task.text}</span>
                    <div class="task-actions">
                        <button class="btn-complete">${btnText}</button>
                        <button class="btn-delete">删除</button>
                    </div>
                `;
                taskList.appendChild(newItem);
            });
        }

        // ==========================================
        // 用户交互操作
        // ==========================================

        // 添加任务
        function addTask() {
            const text = taskInput.value.trim();
            if (text === '') return;

            // 构造一个新任务对象
            const newTask = {
                id: Date.now().toString(), // 用当前时间戳做一个独一无二的 ID
                text: text,
                completed: false
            };

            // 把新任务塞到数组的【最前面】(unshift 代替 push)
            currentTasks.unshift(newTask);

            saveTasks();  // 存起来
            renderTasks(); // 重新画一遍页面（它会自动出现在最上面）
            taskInput.value = ''; 
        }

        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTask();
        });

        // 列表点击事件（委托）
        taskList.addEventListener('click', function(event) {
            // 处理删除弹窗
            const deleteBtn = event.target.closest('.btn-delete');
            if (deleteBtn) {
                const item = deleteBtn.closest('.task-item');
                itemToDeleteId = item.dataset.id; // 记住要删哪个 ID
                deleteModal.classList.add('active');
                return; 
            }

            // 处理完成状态切换
            const completeBtn = event.target.closest('.btn-complete');
            if (completeBtn) {
                const item = completeBtn.closest('.task-item');
                const taskId = item.dataset.id;
                
                // 去数组里找到这个任务
                const task = currentTasks.find(t => t.id === taskId);
                if (task) {
                    task.completed = !task.completed; // 状态反转
                    saveTasks();   // 存起来
                    renderTasks(); // 重新画页面（它会自动跑到下面去）
                }
            }
        });
        
        // 弹窗：确认删除
        confirmDeleteBtn.addEventListener('click', function() {
            if (itemToDeleteId) {
                // 把除了这个 ID 之外的所有任务保留下来（相当于删除了这个任务）
                currentTasks = currentTasks.filter(t => t.id !== itemToDeleteId);
                saveTasks();
                renderTasks();
                itemToDeleteId = null;   
            }
            deleteModal.classList.remove('active'); 
        });

        // 弹窗：取消删除
        cancelDeleteBtn.addEventListener('click', function() {
            itemToDeleteId = null;   
            deleteModal.classList.remove('active'); 
        });

        // ==========================================
        // 页面启动
        // ==========================================
        loadTasks(); // 页面一打开，就开始加载并渲染数据

    </script>
</body>
</html>
